services:
  - type: web
    name: gate-cse-2027-companion
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
